<!DOCTYPE html>
<html>
<head>
    <title>Al Shokar Social</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        text-align: center;
        margin: 0;
        padding: 0;
    }

    .header {
        background-color: black;
        color: gold;
        padding: 15px;
        font-size: 22px;
        font-weight: bold;
    }

    .container {
        margin-top: 50px;
    }

    button {
        padding: 10px 15px;
        margin: 10px;
        border: none;
        background-color: #333;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background-color: gold;
        color: black;
    }

    input[type="file"] {
        margin: 10px;
    }

    .post {
        background: white;
        margin: 10px;
        padding: 10px;
        border-radius: 10px;
    }

    img {
        width: 100%;
        border-radius: 10px;
    }
    </style>

</head>

<body>

<div class="header">
    AL SHOKAR
</div>

<div class="container">
    <button onclick="login()">Login with Google</button>
    <p id="user"></p>

    <input type="file" id="file">
    <br>
    <button onclick="uploadImage()">Post</button>

    <div id="gallery"></div>
</div>

<script>
function login() {
    alert("Login system not connected yet");
}

function uploadImage() {
    let file = document.getElementById("file").files[0];

    if (!file) {
        alert("Choose a file first!");
        return;
    }

    let reader = new FileReader();
    reader.onload = function(e) {
        let img = document.createElement("img");
        img.src = e.target.result;

        let div = document.createElement("div");
        div.className = "post";
        div.appendChild(img);

        document.getElementById("gallery").appendChild(div);
    };

    reader.readAsDataURL(file);
}
</script>

</body>
</html>
