<body>

<header>AL SHOKAR</header>

<div style="padding:10px">

<button onclick="login()">Login with Google</button>
<p id="user"></p>

<input type="file" id="file">
<button onclick="uploadImage()">Post</button>

<div id="gallery"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET",
};

firebase.initializeApp(firebaseConfig);

const storage = firebase.storage();
const db = firebase.firestore();
const auth = firebase.auth();

// LOGIN
function login() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider);
}

auth.onAuthStateChanged(user => {
    if(user){
        document.getElementById("user").innerText =
        "Welcome " + user.displayName;
    }
});

// UPLOAD
function uploadImage() {
    if(!auth.currentUser){
        alert("Login first");
        return;
    }

    const file = document.getElementById("file").files[0];
    if(!file) return alert("Select photo");

    const name = Date.now() + "_" + file.name;
    const ref = storage.ref("posts/" + name);

    ref.put(file).then(() => {
        ref.getDownloadURL().then(url => {

            db.collection("posts").add({
                image: url,
                likes: 0,
                comments: [],
                user: auth.currentUser.displayName,
                uid: auth.currentUser.uid,
                time: Date.now()
            });

            loadPosts();
        });
    });
}

// LOAD POSTS
function loadPosts(){
    document.getElementById("gallery").innerHTML="";

    db.collection("posts").orderBy("time","desc").get().then(snap=>{
        snap.forEach(doc=>{
            let d = doc.data();

            let post = document.createElement("div");
            post.className="post";

            post.innerHTML = `
                <b>${d.user}</b><br><br>
                <img src="${d.image}"><br><br>

                <button onclick="likePost('${doc.id}',${d.likes})">
                ❤️ ${d.likes}</button>

                ${auth.currentUser && auth.currentUser.uid===d.uid ?
                `<button onclick="deletePost('${doc.id}')">🗑️</button>`:""}

                <br><br>

                <input id="c${doc.id}" placeholder="comment">
                <button onclick="comment('${doc.id}')">Send</button>

                <div id="com${doc.id}"></div>
            `;

            document.getElementById("gallery").appendChild(post);

            d.comments.forEach(c=>{
                document.getElementById("com"+doc.id).innerHTML +=
                "<p>"+c+"</p>";
            });
        });
    });
}

// LIKE
function likePost(id,likes){
    db.collection("posts").doc(id).update({
        likes: likes+1
    }).then(loadPosts);
}

// COMMENT
function comment(id){
    let text = document.getElementById("c"+id).value;

    db.collection("posts").doc(id).get().then(doc=>{
        let arr = doc.data().comments;
        arr.push(text);

        db.collection("posts").doc(id).update({
            comments: arr
        }).then(loadPosts);
    });
}

// DELETE
function deletePost(id){
    db.collection("posts").doc(id).delete().then(loadPosts);
}

loadPosts();
</script>
